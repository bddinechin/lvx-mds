    formats: [ ALU_FHQWR ]
    description: >
      The %2 is interpreted as four binary 32 floating-point numbers packed into 128 bits.
      The %2 words are converted to binary 16 floating-point numbers according to the rounding mode.
      If \emph{ziplanes}, the resulting half words are interleaved by perfect shuffling.
      The four resulting half words are packed and stored back into the %1.
      This instruction may raise exception bits in the CS register.
    execution:
      if (ziplanes) {
        result1.16[0] = f32_to_f16(RM, argument2.32[0]);
        result1.16[1] = f32_to_f16(RM, argument2.32[2]);
        result1.16[2] = f32_to_f16(RM, argument2.32[1]);
        result1.16[3] = f32_to_f16(RM, argument2.32[3]);
      } else {
        result1.16[0] = f32_to_f16(RM, argument2.32[0]);
        result1.16[1] = f32_to_f16(RM, argument2.32[1]);
        result1.16[2] = f32_to_f16(RM, argument2.32[2]);
        result1.16[3] = f32_to_f16(RM, argument2.32[3]);
      }
    behavior:
      (IF
        (I2B (READ.ziplanes))
        (SEQ
          (WRITE.16[0].result1 (APPLY.16.f32_to_f16 (READ.RM) (READ.32[0].argument2)))
          (WRITE.16[1].result1 (APPLY.16.f32_to_f16 (READ.RM) (READ.32[2].argument2)))
          (WRITE.16[2].result1 (APPLY.16.f32_to_f16 (READ.RM) (READ.32[1].argument2)))
          (WRITE.16[3].result1 (APPLY.16.f32_to_f16 (READ.RM) (READ.32[3].argument2))))
        (SEQ
          (WRITE.16[0].result1 (APPLY.16.f32_to_f16 (READ.RM) (READ.32[0].argument2)))
          (WRITE.16[1].result1 (APPLY.16.f32_to_f16 (READ.RM) (READ.32[1].argument2)))
          (WRITE.16[2].result1 (APPLY.16.f32_to_f16 (READ.RM) (READ.32[2].argument2)))
          (WRITE.16[3].result1 (APPLY.16.f32_to_f16 (READ.RM) (READ.32[3].argument2)))))
