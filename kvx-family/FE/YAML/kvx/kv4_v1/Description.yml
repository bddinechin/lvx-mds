      block whose effective address is the base address specified in %1. The
      instruction operates on the set of coherent caches accessed by the agent
      executing the instruction. Depending on CSR programming, the instruction
      may perfom a flush operation instead of an invalidate operation.
    formats: [ RV32I_ZICBOM ]
    execution: |
      stage E3:
      MEM.dpurgel(address);
    behavior: |
      (EFFECT.E3.MEM_dpurgel (READ.address))
  - ID: CBO.ZERO
    what: Store zeros to the set of the bytes corresponding to the cache block containing the effective address
    description: >
      A CBO.ZERO instruction performs stores to the set of bytes corresponding
      to a cache block.
    formats: [ RV32I_ZICBOM ]
    execution: |
      stage E3:
      MEM.dzerol(address, 1);
    behavior: |
      (EFFECT.E3.MEM_dzerol (READ.address) (CONST.1))
  - ID: PREFETCH.I
    what: >
      Provide a hint to hardware that the cache block containing the
      effective address is likely to be accessed by an instruction
      fetch in the near future
    description: >
      A prefetch.i instruction indicates to hardware that the cache
      block containing the effective address is likely to be accessed
      by an instruction fetch in the near future. An implementation may
      opt to cache a copy of the cache block in a cache accessed by an
      instruction fetch in order to improve memory access latency, but
      this behavior is not required.
    formats: [ RV32I_STypeZICBOP ]
    execution: |
      ;
    behavior: |
      (SKIP)
  - ID: PREFETCH.R
    what: >
      Provide a hint to hardware that the cache block containing the
      effective address is likely to be accessed by a data read in the
      near future
    description: >
      A prefetch.r instruction indicates to hardware that the cache
      block containing the effective address is likely to be accessed
      by a data read (i.e. load) in the near future. An implementation
      may opt to cache a copy of the cache block in a cache accessed by
      a data read in order to improve memory access latency, but this
      behavior is not required.
    formats: [ RV32I_STypeZICBOP ]
    execution: |
      stage E3:
      MEM.dtouchl(address);
    behavior: |
      (EFFECT.E3.MEM_dtouchl (READ.address))
  - ID: PREFETCH.W
    what: >
      Provide a hint to hardware that the cache block containing the
      effective address is likely to be accessed by a data write in the
      near future
    description: >
      A prefetch.w instruction indicates to hardware that the cache
      block containing the effective address is likely to be accessed
      by a data write (i.e. store) in the near future. An
      implementation may opt to cache a copy of the cache block in a
      cache accessed by a data write in order to improve memory access
      latency, but this behavior is not required
    formats: [ RV32I_STypeZICBOP ]
    execution: |
      ;
    behavior: |
      (EFFECT.E3.MEM_prefetch_w (READ.address))
  - ID: CZERO.EQZ
    what: Conditional Copy Register
    formats: [ RVZI_COND ]
    description: >
      If %3 is 0, 0 is copied into %1, else %2 is copied into %1.
    execution: |
      new rd = (%2 == 0) ? 0 : _ZX_64(%1);
    behavior: |
      (IF
        (EQ (ZX.64 (READ.rs2)) (CONST.0))
        (WRITE.rd (ZX.64 (CONST.0)))
        (WRITE.rd (ZX.64 (READ.rs1)))
      )
  - ID: CZERO.NEZ
    what: Conditional Copy Register
    formats: [ RVZI_COND ]
    description: >
      If %3 is not 0, 0 is copied into %1, else %2 is copied into %1.
    execution: |
      new rd = (%2 != 0) ? 0 : _ZX_64(%1);
    behavior: |
      (IF
        (NE (ZX.64 (READ.rs2)) (CONST.0))
        (WRITE.rd (ZX.64 (CONST.0)))
        (WRITE.rd (ZX.64 (READ.rs1)))
      )
