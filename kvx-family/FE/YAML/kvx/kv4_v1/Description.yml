Resource:
  - ID: ISSUE
    what: Issue slots counted in 32-bit syllables.
    availability: 8
  - ID: TINY
    what: Tiny ALU function units.
    availability: 4
  - ID: LITE
    what: Lite ALU function units.
    availability: 2
  - ID: FULL
    what: Full ALU function units.
    availability: 1
  - ID: LSU
    what: Load/Store function unit.
    availability: 2
  - ID: MAU
    what: Coprocessor main computational unit (COMP).
    availability: 1
  - ID: BCU
    what: Branch and control unit.
    availability: 2
  - ID: EXT
    what: Extension coprocessor units.
    availability: 4
  - ID: AUXR
    what: Auxiliary core register read port shared with LSU (256 bits).
    availability: 1
  - ID: AUXW
    what: Auxiliary core register write port shared with LSU (256 bits).
    availability: 2
  - ID: XFER
    what: Unconditional control-flow transfer (XFER).
    availability: 1
  - ID: MEMW
    what: Memory write or memory read-modify-write resource (MEMW).
    availability: 1
  - ID: SR12
    what: Coprocessor miscellaneous execution unit (MISC).
    availability: 1
  - ID: SR13
    what: Coprocessor compute execution unit addend port (ACCR).
    availability: 1
  - ID: SR14
    what: Coprocessor miscellaneous execution unit write port (OUTW)
    availability: 1
  - ID: SR15
    what: BCU register read port (BRRP)
    availability: 2
