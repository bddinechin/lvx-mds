              (EQ (READ.32[0].argument3) (CONST.0xFFFFFFFF)))
            (SEQ
              (WRITE.64[0].result1 (ZX.32 (READ.32[0].argument2)))
              (WRITE.64[1].result1 (CONST.0)))
            (SEQ
              (WRITE.dividend (SX.32 (READ.32[0].argument2)))
              (WRITE.divisor (SX.32 (READ.32[0].argument3)))
              (WRITE.64[0].result1
                (ZX.32 (DIV (READ.dividend) (READ.divisor))))
              (WRITE.64[1].result1
                (ZX.32 (MOD (READ.dividend) (READ.divisor)))))))
        (IF
          (I2B (READ.signextw))
