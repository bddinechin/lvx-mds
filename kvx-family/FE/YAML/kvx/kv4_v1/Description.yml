      The quotient and the remainder are computed and the corresponding 32-bit integers are zero-extended and packed into the 128 bits of the %1.
      Division by zero returns zero. Modulus by zero returns zero.
      Division of INT\_MIN by -1 returns INT\_MIN. Modulus of INT\_MIN by -1 returns zero.
