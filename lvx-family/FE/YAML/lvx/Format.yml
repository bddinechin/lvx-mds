// Zicbop

  - ID: RV32I_STypeZICBOP
    what: RV32I_STypeZICBOP
    fields:
      - i_11_5: "-------"
      - rs2: { PREFETCH.I: "00000", PREFETCH.R: "00001", PREFETCH.W: "00011" }
      - rs1: "-----"
      - funct3: "110"
      - i_4_0s: "00000"
      - opcode: "0010011"
    encoding: riscv
    operands: [ { mainReg: rs1 }, { signed6 : i_11_5 } ]
    properties: { '%0': MemoryEffect;MemorySize=64, '%1': Base, '%2': Offset }
    syntax: "%0 %2[%1]"
    scheduling: LSU
    execution: |
      stage ID:
      new offset = %2;
      stage RR:
      new base = %1;
      new address = base + (offset << 5);
      @Instruction
    behavior: |
      (SEQ
        (WRITE.offset
          (SHL (METHOD.%2) (CONST.5))
        )
        (WRITE.base (ACCESS.RR.%1))
        (WRITE.address
          (ADD
            (READ.base)
            (READ.offset)
          )
        )
        (MACRO.Instruction)
      )

