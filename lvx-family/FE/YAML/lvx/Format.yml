  - ID: roundOnce
    execution: &executionRoundOnce |
      ro_ov = 0;
      ro_un = 0;
      ro_in = 0;
      ro_inf = 0;
      if (ro_mant == 0) {
        ro_expo = ro_lsb0;
      } else {
        ro_lead = ro_expo + (256 - _CLZ_256(ro_mant)) - 1;
        ro_lsb = _MAX_(ro_lead + 1 - ro_p, ro_emin + 1 - ro_p);
        ro_shift = ro_lsb - ro_expo;
        if (ro_shift <= 0) {
          ro_mant = ro_mant << _MAX_(-ro_shift, 0);
          ro_expo = ro_lsb;
        } else {
          ro_g = (ro_mant >> _MAX_(ro_shift - 1, 0)) & 1;
          ro_s = (ro_mant & ((1 << _MAX_(ro_shift - 1, 0)) - 1)) != 0;
          ro_t = ro_mant >> _MAX_(ro_shift, 0);
          ro_in = ro_g | ro_s;
          ro_odd = ro_t & 1;
          ro_incr = RM == 0 ? ro_g & (ro_s | ro_odd)
                  : RM == 1 ? 0
                  : RM == 2 ? ro_sign & ro_in
                  : RM == 3 ? (ro_sign ^ 1) & ro_in
                  : RM == 4 ? ro_g
                  : ro_in & (ro_odd ^ 1);
          ro_mant = ro_t + ro_incr;
          ro_expo = ro_lsb;
          if ((256 - _CLZ_256(ro_mant)) > ro_p) {
            ro_mant = ro_mant >> 1;
            ro_expo = ro_expo + 1;
          }
        }
        ro_lead = ro_expo + (256 - _CLZ_256(ro_mant)) - 1;
        if (ro_lead > ro_emax) {
          ro_ov = 1;
          ro_in = 1;
          ro_inf = RM == 1 ? 0 : RM == 6 ? 0 : RM == 2 ? ro_sign : RM == 3 ? (ro_sign ^ 1) : 1;
        } else if (ro_lead < ro_emin && ro_in) {
          ro_un = 1;
        }
      }
    behavior: &behaviorRoundOnce |
      (SEQ
        (WRITE.ro_ov (CONST.0))
        (WRITE.ro_un (CONST.0))
        (WRITE.ro_in (CONST.0))
        (WRITE.ro_inf (CONST.0))
        (IF
          (EQ (READ.ro_mant) (CONST.0))
          (WRITE.ro_expo (READ.ro_lsb0))
          (SEQ
            (WRITE.ro_lead
              (SUB (ADD (READ.ro_expo) (SUB (CONST.256) (CLZ.256 (READ.ro_mant)))) (CONST.1)))
            (WRITE.ro_lsb
              (MAX (SUB (ADD (READ.ro_lead) (CONST.1)) (READ.ro_p))
                   (SUB (ADD (READ.ro_emin) (CONST.1)) (READ.ro_p))))
            (WRITE.ro_shift (SUB (READ.ro_lsb) (READ.ro_expo)))
            (IF
              (LE (READ.ro_shift) (CONST.0))
              (SEQ
                (WRITE.ro_mant (SHL (READ.ro_mant) (MAX (NEG (READ.ro_shift)) (CONST.0))))
                (WRITE.ro_expo (READ.ro_lsb)))
              (SEQ
                (WRITE.ro_g
                  (AND (SHR (READ.ro_mant) (MAX (SUB (READ.ro_shift) (CONST.1)) (CONST.0))) (CONST.1)))
                (WRITE.ro_s
                  (SELECT
                    (NE (AND (READ.ro_mant)
                             (SUB (SHL (CONST.1) (MAX (SUB (READ.ro_shift) (CONST.1)) (CONST.0))) (CONST.1)))
                        (CONST.0))
                    (CONST.1) (CONST.0)))
                (WRITE.ro_t (SHR (READ.ro_mant) (MAX (READ.ro_shift) (CONST.0))))
                (WRITE.ro_in (IOR (READ.ro_g) (READ.ro_s)))
                (WRITE.ro_odd (AND (READ.ro_t) (CONST.1)))
                (WRITE.ro_incr
                  (SELECT (EQ (READ.RM) (CONST.0))
                    (AND (READ.ro_g) (IOR (READ.ro_s) (READ.ro_odd)))
                  (SELECT (EQ (READ.RM) (CONST.1))
                    (CONST.0)
                  (SELECT (EQ (READ.RM) (CONST.2))
                    (AND (READ.ro_sign) (READ.ro_in))
                  (SELECT (EQ (READ.RM) (CONST.3))
                    (AND (XOR (READ.ro_sign) (CONST.1)) (READ.ro_in))
                  (SELECT (EQ (READ.RM) (CONST.4))
                    (READ.ro_g)
                    (AND (READ.ro_in) (XOR (READ.ro_odd) (CONST.1)))))))))
                (WRITE.ro_mant (ADD (READ.ro_t) (READ.ro_incr)))
                (WRITE.ro_expo (READ.ro_lsb))
                (IF
                  (GT (SUB (CONST.256) (CLZ.256 (READ.ro_mant))) (READ.ro_p))
                  (SEQ
                    (WRITE.ro_mant (SHR (READ.ro_mant) (CONST.1)))
                    (WRITE.ro_expo (ADD (READ.ro_expo) (CONST.1))))
                  (SKIP))))
            (WRITE.ro_lead
              (SUB (ADD (READ.ro_expo) (SUB (CONST.256) (CLZ.256 (READ.ro_mant)))) (CONST.1)))
            (IF
              (GT (READ.ro_lead) (READ.ro_emax))
              (SEQ
                (WRITE.ro_ov (CONST.1))
                (WRITE.ro_in (CONST.1))
                (WRITE.ro_inf
                  (SELECT (EQ (READ.RM) (CONST.1)) (CONST.0)
                  (SELECT (EQ (READ.RM) (CONST.6)) (CONST.0)
                  (SELECT (EQ (READ.RM) (CONST.2)) (READ.ro_sign)
                  (SELECT (EQ (READ.RM) (CONST.3)) (XOR (READ.ro_sign) (CONST.1))
                    (CONST.1)))))))
              (IF
                (ANDL (LT (READ.ro_lead) (READ.ro_emin)) (I2B (READ.ro_in)))
                (WRITE.ro_un (CONST.1))
                (SKIP))))))

