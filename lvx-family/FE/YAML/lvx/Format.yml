Format:

  ## BCU: steering=00


  - ID: BCU_CCB
    what: BCU Compare Conditional Branches
    fields:
      - parallel: "-"
      - steering: "00"
      - bcucode1: { CCB: "00" }
      - ccbcomp: "----"
      - pcrel11s2: "-----------"
      - registerY: "------"
      - registerZ: "------"
    encoding: simple
    operands: [ ccbcomp, { singleReg: registerZ }, { singleReg: registerY }, pcrel11s2 ]
    syntax: "%0%1 %2, %3 ? %4"
    properties: { '%0': Control;Conditional, '%4': Target }
    scheduling: BCU_BRRP2
    execution: |
      stage RR:
      new argument1 = %1;
      new argument2 = %2;
      new argument3 = %3;
      new argument4 = %4;
    behavior: |
      (SEQ
        (WRITE.argument1 (ACCESS.RR.%1))
        (WRITE.argument2 (ACCESS.RR.%2))
        (WRITE.argument3 (ACCESS.RR.%3))
        (WRITE.argument4 (ACCESS.RR.%4)))

  - ID: BCU_CCB.X
    what: BCU Compare Conditional Branches Extended
    fields2:
      - parallel2: "-"
    fields1:
      - steerimx: "00"
      - exunum2: "00"
      - upper27: "---------------------------"
      - parallel: "1"
    fields:
      - steering: "00"
      - bcucode1: { CCBX: "00" }
      - ccbcomp: "----"
      - lower11: "-----------"
      - registerY: "------"
      - registerZ: "------"
    encoding: double
    operands: [ ccbcomp, { singleReg: registerZ }, { singleReg: registerY }, { pcrel38s2: [ upper27, lower11 ] } ]
    syntax: "%0%1 %2, %3 ? %4"
    properties: { '%0': Control;Conditional, '%4': Target }
    scheduling: BCU2.X
    execution: |
      stage RR:
      new argument1 = %1;
      new argument2 = %2;
      new argument3 = %3;
      new argument4 = %4;
    behavior: |
      (SEQ
        (WRITE.argument1 (ACCESS.RR.%1))
        (WRITE.argument2 (ACCESS.RR.%2))
        (WRITE.argument3 (ACCESS.RR.%3))
        (WRITE.argument4 (ACCESS.RR.%4)))

