  - ID: ALU_BFWR
    what: ALU Bit Field Write Read
    fields:
      - parallel: "-"
      - steering: "11"
      - exubit28: "0"
      - wricode1: { "[ INSF, EXTFZ, EXTFS ]": "00..10" }
      - stopbit2: "--"
      - registerW: "------"
      - exucode4: "01"
      - stopbit4: "----"
      - startbit: "------"
      - registerZ: "------"
    encoding: simple
    operands: [ { singleReg: registerW }, { singleReg: registerZ }, { unsigned6: [ stopbit2, stopbit4 ] }, { unsigned6: startbit } ]
    syntax: "%0 %1 = %2, %3, %4"
    scheduling: ALU_TINY
    execution: |
      stage ID:
      new startbit = %4;
      new stopbit = %3;
      new bias = startbit <= stopbit;
      new mask = _ZX_64((2 << stopbit) - ((2 - bias) << startbit) + bias - 1);
      stage RR:
      new argument2 = %2;
      @Instruction
      stage E1:
      %1 = result1;
    behavior: |
      (SEQ
        (WRITE.startbit (ACCESS.ID.%4))
        (WRITE.stopbit (ACCESS.ID.%3))
        (WRITE.bias
          (B2I
            (LE
              (READ.startbit)
              (READ.stopbit))))
        (WRITE.mask
          (ZX.64
            (ADD
              (SUB
                (SHL
                  (CONST.2)
                  (READ.stopbit))
                (SHL
                  (SUB
                    (CONST.2)
                    (READ.bias))
                  (READ.startbit)))
              (SUB
                (READ.bias)
                (CONST.1)))))
        (WRITE.argument2 (ACCESS.RR.%2))
        (MACRO.Instruction)
        (COMMIT.E1.%1 (READ.result1)))

