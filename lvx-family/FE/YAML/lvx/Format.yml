      - rs1: "-----"
      - funct3: "010"
      - rd: "00000"
      - opcode: "0001111"
    encoding: riscv
    operands: [ { mainReg: rs1 } ]
    properties: { '%0': MemoryEffect;MemorySize=64, '%1': Base }
    syntax: "%0 [%1]"
    scheduling: LSU
    execution: |
