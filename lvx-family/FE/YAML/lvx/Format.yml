    execution: |
      stage ID:
      new startbit = %4;
      new stopbit = %3;
      new bias = startbit <= stopbit;
      new mask = _ZX_64((2 << stopbit) - ((2 - bias) << startbit) + bias - 1);
      stage RR:
      new argument2 = %2;
      @Instruction
      stage E1:
      %1 = result1;
    behavior: |
      (SEQ
        (WRITE.startbit (ACCESS.ID.%4))
        (WRITE.stopbit (ACCESS.ID.%3))
        (WRITE.bias
          (B2I
            (LE
              (READ.startbit)
              (READ.stopbit))))
        (WRITE.mask
          (ZX.64
            (ADD
              (SUB
                (SHL
                  (CONST.2)
                  (READ.stopbit))
                (SHL
                  (SUB
                    (CONST.2)
                    (READ.bias))
                  (READ.startbit)))
              (SUB
                (READ.bias)
                (CONST.1)))))
        (WRITE.argument2 (ACCESS.RR.%2))
        (MACRO.Instruction)
        (COMMIT.E1.%1 (READ.result1)))

