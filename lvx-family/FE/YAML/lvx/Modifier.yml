      - Boolean CAS
    execution: "_ZX_1(%0)"

  - ID: accesses
    what: Fence Access
    members: [ ., .W, .R, .WA ]
    cases:
      - All Accesses
      - Write Accesses
      - Read Accesses
      - Write Accesses (asynchronous)
    execution: "_ZX_2(%0)"

  - ID: channel
    what: Coprocessor Channel
    members: [ .F, .B ]
    cases:
      - Forward Channel
      - Backward Channel
    execution: "_ZX_1(%0)"

  - ID: conjugate
    what: Complex Conjugate
    members: [ ., .C ]
    cases:
      - Default
      - Conjugate
    execution: "_ZX_1(%0)"

  - ID: imultiply
    what: Multiply by Imaginary Unit
    members: [ ., .MI ]
    cases:
      - Default
      - Multiply by I
    execution: "_ZX_1(%0)"

  - ID: realimag
    what: Complex Part
    members: [ .R, .I ]
    cases:
      - Real Part
      - Imaginary Part
    execution: "_ZX_1(%0)"

  - ID: shuffleV
    what: Shuffle a Word Vector (1024 bits)
    members: [ ., .TD ]
    cases:
      - No Shuffle
      - Transpose Double Words 4x4
    execution: "_ZX_1(%0)"

  - ID: shuffleX
    what: Shuffle a Word Hexadecuple (512 bits)
    members: [ ., .ZD, .UD, .TQ, .TW, .ZW, .UW ]
    cases:
      - No Shuffle
      - Zip Double Words
      - Unzip Double Words
      - Transpose Quadruple Words 2x2
      - Transpose Words 4x4
      - Zip Words
      - Unzip Words
    execution: "_ZX_3(%0)"

  - ID: splat32
    what: Splat 32-bit Immediate
    members: [ ., ".@" ]
    cases:
      - No splat
      - Splat x2
    execution: "_ZX_1(%0)"

#endif//_KV4_

#ifdef _LVX_RV_

  - ID: ordering
    what: Fence predecessor and successor ordering
