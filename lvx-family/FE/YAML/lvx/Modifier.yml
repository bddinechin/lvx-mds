  - ID: froundmode
    what: Floating-point rounding mode
    members: [ RNE, RTZ, RDN, RUP, RMM, _RES5, _RES6, DYN ]
    cases:
      - Round to Nearest, ties to Even
      - Round Towards Zero
      - Round Down (towards -Inf)
      - Round Up (towards +Inf)
