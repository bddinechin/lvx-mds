      - L2 Cache
    execution: "_ZX_2(%0)"

  - ID: coherency
    what: Coherency Domain for atomics
    members: [ ., .G, .S ]
    cases:
      - Local
      - Global
      - Reserved
    execution: "_ZX_2(%0)"

  - ID: boolcas
    what: Boolean Compare-and-Swap
    members: [ .V, . ]
    cases:
