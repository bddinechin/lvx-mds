  - ID: FADDWC
    what: Floating-Point Add to Word Complex
    class: FPU
    formats: [ ALU_FWCOP ]
    description: >
      The %3 and the %2 are interpreted as binary 32 floating-point complex numbers.
      If \emph{conjugate} is set, the complex conjugate of the %2 is used in the operation.
      The real and imaginary parts are respectively added to and rounded according to the rounding mode.
      If \emph{imultiply} is set, the result is multiplied by the imaginary unit.
      The resulting binary 32 floating-point complex number is stored back into the %1.
      This instruction may raise exception bits in the CS register.
    execution: |
      fconj = conjugate ? 0x80000000 : 0;
      result1.32[0] = f32_add(RM, argument2.32[0], argument3.32[0]);
      result1.32[1] = f32_add(RM, argument2.32[1]^fconj, argument3.32[1]);
      if (imultiply) {
        result1 = _SWAP_32(result1);
        result1.32[0] = result1.32[0] ^ 0x80000000;
      }
    behavior: |
      (SEQ
        (WRITE.fconj
          (SELECT
            (I2B (READ.conjugate))
            (CONST.0x80000000)
            (CONST.0)))
        (WRITE.32[0].result1
          (APPLY.f32_add
            (READ.RM)
            (READ.32[0].argument2)
            (READ.32[0].argument3)))
        (WRITE.32[1].result1
          (APPLY.f32_add
            (READ.RM)
            (XOR (READ.32[1].argument2)
                 (READ.fconj))
            (READ.32[1].argument3)))
        (IF
          (I2B (READ.imultiply))
          (SEQ
            (WRITE.result1
              (SWAP.32 (READ.result1)))
            (WRITE.32[0].result1
              (XOR (READ.32[0].result1) (CONST.0x80000000))))
          (SKIP)))

