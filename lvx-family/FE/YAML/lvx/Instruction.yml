  - ID: FWIDENWD
    what: Floating Point Widen Word to Double Word
    class: FPU
    formats: [ ALU_FDWIDEN ]
    description: >
      The %2 is interpreted as a binary 32 floating-point number.
      The least or most significant word of the %2 double word is selected, depending on \emph{mostsig}.
      The number is converted to a binary 64 floating-point number and stored into the %1.
    execution: |
      if (mostsig) {
        argument2 = argument2 >> 32;
      }
      result1 = f32_to_f64(argument2.32[0]);
    behavior: |
      (SEQ
        (IF
          (I2B (READ.mostsig))
          (WRITE.argument2
            (SHR (READ.argument2) (CONST.32)))
          (SKIP))
        (WRITE.result1
          (APPLY.64.f32_to_f64
            (READ.32[0].argument2))))

