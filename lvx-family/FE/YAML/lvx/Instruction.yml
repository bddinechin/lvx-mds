    formats: [ LSU_FXSW ]
    description: >
      The set and way are sent to the data cache, with request to invalidate the corresponding cache line.
      Has no effects if the line is not cached.
    execution: |
      stage E3:
      if (!dinvallsw_owner()) {
        _THROW(PRIVILEGE);
      } else {
