  - ID: ACSWAPB
    what: Atomic Compare and Swap Byte
    formats: [ LSU_ACSWAPSB, LSU_ACSWAPSB.O, LSU_ACSWAPSB.D ]
    properties: { '%0': MemoryEffect;MemorySize=1;MemoryAligned }
    description: >
      This instruction implements Compare-And-Swap (CAS) on memory byte (8 bits).
      The %3 is interpreted as the concatenation of \texttt{update} (low 64 bits) and \texttt{expected} (high 64 bits).
      The memory byte at the effective address is read into \texttt{current}.
      If \texttt{current} equals \texttt{expected}, the swap is successful and \texttt{update}
      is stored into the memory byte at the effective address. Otherwise, the swap has failed and the memory is not updated.
      The instruction return value is stored into the %1. It is true/false in case \texttt{boolcas} is true, or
      the \texttt{current} value in case \texttt{boolcas} is false.
    execution: |
      new result1 = MEM.atomic_cas(address, 0x1, boolcas | (coherency << 32), arguments.8[0], arguments.8[8], @1);
    behavior: |
      (WRITE.result1
        (APPLY.32.MEM_atomic_cas
          (READ.address)
          (CONST.0x1)
          (IOR
            (READ.boolcas)
            (SHL (READ.coherency) (CONST.32)))
          (READ.8[0].arguments)
          (READ.8[8].arguments)
          (METHOD.%1)))

