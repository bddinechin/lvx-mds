  - ID: MULD
    what: Multiply Double Word
    formats: [ ALU_DMWRR, ALU_DMWRR.M ]
    description: >
      The %3 and the %2 double words are sign-extended or zero-extended from 64 bits, depending on the %4.
      The %3 double word is multiplied by the %2 double word, and the product is optionally shifted right by 64 bits, depending on the %4.
      The resulting double word is stored into the %1.
    execution: |
      if (highmult == 0 || highmult == 3) {
        product = _SX_64(argument2) * _SX_64(argument3);
      }
      if (highmult == 1) {
        product = _ZX_64(argument2) * _ZX_64(argument3);
      }
      if (highmult == 2) {
        product = _SX_64(argument2) * _ZX_64(argument3);
      }
      if (highmult)
        result1 = product.64[1];
      else
        result1 = product.64[0];
    behavior: |
      (SEQ
        (IF (IORL (EQ (READ.highmult) (CONST.0))
                  (EQ (READ.highmult) (CONST.3)))
          (WRITE.product
            (MUL
              (SX.64 (READ.argument2))
              (SX.64 (READ.argument3))))
          (SKIP))
        (IF
          (EQ (READ.highmult) (CONST.1))
          (WRITE.product
            (MUL
              (ZX.64 (READ.argument2))
              (ZX.64 (READ.argument3))))
          (SKIP))
        (IF
          (EQ (READ.highmult) (CONST.2))
          (WRITE.product
            (MUL
              (SX.64 (READ.argument2))
              (ZX.64 (READ.argument3))))
          (SKIP))
        (IF
          (I2B (READ.highmult))
          (WRITE.result1
