    properties: "Conditional Control"
    parameters:
      - action: WriteList
        method:
          RegClass: ""
        stages: 2
      - action: Read
        method:
          Immediate: pcrel27s2
        usage: Target
        stages: 1
      - action: ReadList
        method:
          RegClass: ""
        stages: 1
