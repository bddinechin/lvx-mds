      No effects except extending the current bundle by one syllable.
    execution: |
      ;
    behavior: |
      (SKIP)
  - ID: STSUD
    what: Subtract, Test and Shift Unsigned Double Word
    formats: [ ALU_DWRRS ]
    description: >
      The %2 is subtracted from the %3 If positive, the result is shifted left one bit and OR-ed with 0x1.
      Else, the %3 is shifted left one bit. The result is stored into the %1.
      This instruction is provided to support double word unsigned integer division.
    execution: |
      new result1 = _ZX_64(argument3) >= _ZX_64(argument2) ?
                    _ZX_64(argument3) - _ZX_64(argument2) << 1 | 1 :
                    _ZX_64(argument3) << 1;
    behavior: |
      (WRITE.result1
        (SELECT
          (GE
            (ZX.64 (READ.argument3))
            (ZX.64 (READ.argument2)))
          (IOR
            (SHL
              (SUB
                (ZX.64 (READ.argument3))
                (ZX.64 (READ.argument2)))
              (CONST.1))
            (CONST.1))
          (SHL
            (ZX.64 (READ.argument3))
            (CONST.1))))
  - ID: STSUDP
    what: Subtract, Test and Shift Unsigned Double Word Pair
    formats: [ ALU_DPWRRS ]
    description: >
      The %2 interpreted as a double word pair is subtracted from the %3 interpreted as a double word pair.
      For each result, if the difference is positive it is shifted left one bit and OR-ed with 0x1.
      Else, the result is the corresponding word of the %3 is shifted left one bit.
      The two resulting double words are packed and stored into the %1.
    execution: |
      for (i range 2) {
        result1.64[i] = _ZX_64(argument3.64[i]) >= _ZX_64(argument2.64[i]) ?
                        _ZX_64(argument3.64[i]) - _ZX_64(argument2.64[i]) << 1 | 1 :
                        _ZX_64(argument3.64[i]) << 1;
      }
    behavior: |
      (FOR.I (RANGE.2)
        (WRITE.64[(INDEX.I)].result1
          (SELECT
            (GE
              (ZX.64 (READ.64[(INDEX.I)].argument3))
              (ZX.64 (READ.64[(INDEX.I)].argument2)))
            (IOR
              (SHL
                (SUB
                  (ZX.64 (READ.64[(INDEX.I)].argument3))
                  (ZX.64 (READ.64[(INDEX.I)].argument2)))
                (CONST.1))
