        result1.32[0] = result1.32[0] ^ 0x80000000;
      }
    behavior: |
      (SEQ
        (IF
          (I2B (READ.conjugate))
          (WRITE.64[0].argument2
            (APPLY.64.fconj_32_32
              (READ.64[0].argument2)))
           (SKIP))
        (BIND.lane,lio,lov,lin
          (APPLY.64,1,1,1.ffmac_32_32
              (READ.RM)
              (READ.64[0].argument2)
              (READ.64[0].argument3)
              (READ.64[0].argument1)))
        (WRITE.64[0].result1 (READ.lane))
        (WRITE.fio (IOR (READ.fio) (READ.lio)))
        (WRITE.fov (IOR (READ.fov) (READ.lov)))
        (WRITE.fin (IOR (READ.fin) (READ.lin)))
        (IF
          (I2B (READ.imultiply))
          (SEQ
            (WRITE.result1
              (SWAP.32 (READ.result1)))
            (WRITE.32[0].result1
              (XOR (READ.32[0].result1) (CONST.0x80000000))))
          (SKIP)))
  - ID: COPYO
    what: Copy Octuple Word
    formats: [ LSU_COPYO ]
    description: >
      The %1 operand receives the %2 value.
    execution: |
      new result1 = argument2;
    behavior: |
      (WRITE.result1
        (READ.argument2))
  - ID: CATDQ
    what: Catenate Double to Quadruple Word
    formats: [ ALU_CATDQ ]
    description: >
      The %1 operand receives the concatenation of the %2 and %3 values.
    execution: |
      new result1 = _ZX_64(argument2) | (argument3 << 64);
    behavior: |
      (WRITE.result1
        (IOR
          (ZX.64 (READ.argument2))
          (SHL (READ.argument3) (CONST.64))))
  - ID: XMOVETO
    what: Move To Extension Octuple Word
    formats: [ ALU_XMOVETO ]
    properties: { '%0': Extension }
    description: >
      The %1 operand receives the concatenation of the %2 value and the %3 value.
    execution: |
      new result1 = 0;
      result1.128[0] = argument2;
      result1.128[1] = argument3;
    behavior: |
      (SEQ
        (WRITE.result1 (CONST.0))
        (WRITE.128[0].result1 (READ.argument2))
        (WRITE.128[1].result1 (READ.argument3)))
  - ID: XMOVETQ
    what: Move To Extension Quadruple Word
    formats: [ ALU_XMOVETQ0, ALU_XMOVETQ1 ]
