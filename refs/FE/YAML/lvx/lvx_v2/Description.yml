Generic:
##
## Helper.yml
##
## The signature of an operator helper: the hand-written C that a Behavior APPLY, EFFECT,
## TEST or THROW calls out to. See DOC/MDD.dtd's Helper element for the argument.
##
## `arguments` is the width in bits of each argument, in the order the behaviour passes
## them, counting the ones it leaves UNDEF. `result` is the width of what the helper
## returns, and must agree with what every APPLY of it declares. A width of 256 is
## the container, and saying it is the same as saying nothing.
##
## That agreement is CHECKED -- `helper-result`, and fatal. It used to be a promise this
## header made and nothing kept: CodeGen types the call from the declaration here, the
## width analysis bounds it from the APPLY, and the two never met.
##
## `result` takes two or more widths for a TUPLE-valued helper -- `result: [32, 1, 1, 1,
## 1, 1]` is a flag-returning FP operator returning (result, io, dz, ov, un, in), one
## element per IEEE flag so each goes straight to its own CS bitfield with no bit
## arithmetic. Its call site is then a BIND of an APPLY with the matching widths, which
## destructures the tuple into ordinary variables:
##
## (BIND.result1,fio,fdz,fov,fun,fin
## (APPLY.32,1,1,1,1,1.f32_add (READ.RM) (READ.argument2) (READ.argument3)))
##
## Declaring a tuple therefore means converting every APPLY of that helper in the same
## edit -- `helper-result` will not let it land half done. See DOC/FP-helpers.md.
##
## A helper with no entry here takes and returns Int256_ -- a 32-byte union passed by
## value -- which is what all ~137 of them did. So this file is a migration, not a
## contract that must be complete: declare a helper when its widths are actually known,
## and leave the rest alone.
##
## TWO THINGS TO KNOW BEFORE ADDING AN ENTRY.
##
## A declared width is a TRUNCATION, and it is the description saying so out loud. If a
## call site passes a value that needs more bits than the declaration allows, the extra
## bits are dropped -- and that is the point for `branch_info`, whose second argument is a
## program counter: the sum PC + signed_offset needs 66 bits and the architecture keeps 64.
## `make -C MDD/MDE` reports every such site (WIDTH_CHECK=verbose lists them), so an entry
## that truncates something you did not mean to truncate is not silent.
##
## A declared width is also a CLAIM ABOUT THE HELPER, and no test can check it for you.
## The differential test in BE/LAO/TEST checks that the generator does what this file says;
## it cannot check that what this file says is true of the C the helper is implemented in.
## Declare only what the architecture actually guarantees.
##
