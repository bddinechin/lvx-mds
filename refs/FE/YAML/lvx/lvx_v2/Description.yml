Simulated:
  - ID: ADJUST
    what: Adjust Stack Pointer
    scheduling: ALU_LITE
    syntax: "%0 %1 = %2, %3"
    parameters:
      - action: Write
        method:
          RegClass: singleReg
        proxy: "%1"
        stages: 2
      - action: Read
        method:
          RegClass: singleReg
        usage: Left
        proxy: "%2"
        stages: 1
      - action: "Read"
        method:
          Immediate: signed10
        usage: Right
        proxy: "%3"
        stages: 0
  - ID: GETPC
    what: Get Program Counter
    scheduling: BCU
    syntax: "%0 %1"
    parameters:
      - action: Write
        method:
          Register: PC
        proxy: "%1"
        stages: 2
      - action: Read
        method:
          Immediate: pcrel27s2
        proxy: "%2"
        stages: 0
  - ID: SET_GOTP
    what: Get System Register in PIC Mode
    scheduling: ALL
    syntax: "unspecified"
    parameters:
      - action: Write
        method:
          RegClass: singleReg
        proxy: "%1"
        stages: 2
      - action: Write
        method:
          RegClass: singleReg
        proxy: "%3"
        stages: 2
      - action: Read
        method:
          RegClass: systemReg
        proxy: "%2"
        stages: 1
      - action: Read
        method:
          Immediate: wrapped32
        proxy: "%4"
        stages: 1
  - ID: GNUASM
    what: GNU ASM Statement.
    scheduling: ALL
    syntax: "%0"
    parameters:
      - action: WriteList
        method:
