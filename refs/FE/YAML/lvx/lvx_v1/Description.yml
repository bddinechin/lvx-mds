Reservation:
  - ID: ALL
    what: Instruction must be alone in instruction bundle.
    requirements: [ 8 ]
    resources: [ ISSUE ]
  - ID: ALU_TINY
    what: Instruction must issue on one of the four TINY units.
    requirements: [ 1, 1 ]
    resources: [ ISSUE, TINY ]
  - ID: ALU_TINY.X
    what: Instruction with one immediate extension, must issue on one of the four TINY units.
    requirements: [ 2, 1 ]
    resources: [ ISSUE, TINY ]
  - ID: ALU_TINY.Y
    what: Instruction with two immediate extensions, must issue on one of the four TINY units.
    requirements: [ 3, 1 ]
    resources: [ ISSUE, TINY ]
  - ID: ALU_TINY_AUXR
    what: Instruction must issue on one of the four TINY units, and requires an auxiliary read port.
    requirements: [ 1, 1, 1 ]
    resources: [ ISSUE, TINY, AUXR ]
  - ID: ALU_LITE
    what: Instruction must issue on one of the two LITE units.
    requirements: [ 1, 1, 1 ]
    resources: [ ISSUE, LITE, TINY ]
  - ID: ALU_LITE.X
    what: Instruction with one immediate extension, must issue on one of the two LITE units.
    requirements: [ 2, 1, 1 ]
    resources: [ ISSUE, LITE, TINY ]
  - ID: ALU_LITE.Y
    what: Instruction with two immediate extensions, must issue on one of the two LITE units.
    requirements: [ 3, 1, 1 ]
    resources: [ ISSUE, LITE, TINY ]
  - ID: ALU_LITE_MISC
    what: Instruction must issue on one of the two LITE units and used the write port of the MISC unit.
    requirements: [ 1, 1, 1, 1 ]
    resources: [ ISSUE, LITE, TINY, SR12 ]
  - ID: ALU_FULL
    what: Instruction must issue on the ALU0.
    requirements: [ 1, 1, 1, 1 ]
    resources: [ ISSUE, TINY, LITE, FULL ]
  - ID: ALU_FULL.X
    what: Instruction with one immediate extension, must issue on the ALU0.
    requirements: [ 2, 1, 1, 1 ]
    resources: [ ISSUE, TINY, LITE, FULL ]
  - ID: ALU_FULL.Y
    what: Instruction with two immediate extensions, must issue on the ALU0.
    requirements: [ 3, 1, 1, 1 ]
    resources: [ ISSUE, TINY, LITE, FULL ]
  - ID: BCU
    what: Instruction must issue on the BCU.
    requirements: [ 1, 1 ]
    resources: [ ISSUE, BCU ]
  - ID: BCU_BRRP
    what: Instruction must issue on the BCU and reads a general register.
    requirements: [ 1, 1, 1 ]
    resources: [ ISSUE, BCU, SR15 ]
  - ID: BCU_BRRP2
    what: Instruction uses a BCU and two register read ports.
    requirements: [ 1, 1, 2 ]
    resources: [ ISSUE, BCU, SR15 ]
  - ID: BCU2
    what: Instruction uses the two BCUs and one issue slot.
    requirements: [ 1, 2 ]
    resources: [ ISSUE, BCU ]
  - ID: BCU2.X
    what: Instruction uses the two BCUs and two issue slots.
    requirements: [ 2, 2 ]
    resources: [ ISSUE, BCU ]
  - ID: BCU_XFER
    what: Instruction uses a BCU and unconditionally transfers control.
    requirements: [ 1, 1, 1 ]
    resources: [ ISSUE, BCU, XFER ]
  - ID: BCU_XFER_BRRP
    what: Instruction uses a BCU, reads a general register and unconditionally transfers control.
    requirements: [ 1, 1, 1, 1 ]
    resources: [ ISSUE, BCU, XFER, SR15 ]
  - ID: BCU2_TINY_LSU
    what: Instruction uses the two BCUs and uses the TINY LSU write port.
    requirements: [ 1, 2, 1, 1 ]
    resources: [ ISSUE, BCU, TINY, LSU ]
  - ID: LSU
    what: Instruction must issue on the LSU.
    requirements: [ 1, 1, 1 ]
    resources: [ ISSUE, TINY, LSU ]
  - ID: LSU.X
    what: Instruction with one immediate extension, must issue on the LSU.
    requirements: [ 2, 1, 1 ]
    resources: [ ISSUE, TINY, LSU ]
  - ID: LSU.Y
    what: Instruction with two immediate extensions, must issue on the LSU.
    requirements: [ 3, 1, 1 ]
    resources: [ ISSUE, TINY, LSU ]
  - ID: LSU_MEMW_ACCR
    what: Instruction must issue on the LSU and writes to memory.
