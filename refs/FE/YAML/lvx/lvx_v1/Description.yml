  - ID: CATDQ
    what: Catenate Double to Quadruple Word
    formats: [ ALU_CATDQ ]
    description: >
      The %1 operand receives the concatenation of the %2 and %3 values.
    execution: |
      new result1 = _ZX_64(argument2) | (argument3 << 64);
    behavior: |
      (WRITE.result1
        (IOR
          (ZX.64 (READ.argument2))
          (SHL (READ.argument3) (CONST.64))))
