  - ID: FADDWC
    what: Floating-Point Add to Word Complex
    class: FPU
    formats: [ ALU_FWCOP ]
    description: >
      The %3 and the %2 are interpreted as binary 32 floating-point complex numbers.
      If \emph{conjugate} is set, the complex conjugate of the %2 is used in the operation.
      The real and imaginary parts are respectively added to and rounded according to the rounding mode.
      If \emph{imultiply} is set, the result is multiplied by the imaginary unit.
      The resulting binary 32 floating-point complex number is stored back into the %1.
      This instruction may raise exception bits in the CS register.
    execution: |
      fconj = conjugate ? 0x80000000 : 0;
      new (lane0, io0, ov0, in0) = f32_add(RM, argument2.32[0], argument3.32[0]);
      result1.32[0] = lane0;
      new (lane1, io1, ov1, in1) = f32_add(RM, argument2.32[1]^fconj, argument3.32[1]);
      result1.32[1] = lane1;
      fio = io0 | io1;
      fov = ov0 | ov1;
      fin = in0 | in1;
      if (imultiply) {
        result1 = _SWAP_32(result1);
        result1.32[0] = result1.32[0] ^ 0x80000000;
      }
    behavior: |
      (SEQ
        (WRITE.fconj
          (SELECT
            (I2B (READ.conjugate))
            (CONST.0x80000000)
            (CONST.0)))
        (BIND.lane0,io0,ov0,in0
          (APPLY.32,1,1,1.f32_add
            (READ.RM)
            (READ.32[0].argument2)
            (READ.32[0].argument3)))
        (WRITE.32[0].result1 (READ.lane0))
        (BIND.lane1,io1,ov1,in1
          (APPLY.32,1,1,1.f32_add
            (READ.RM)
            (XOR (READ.32[1].argument2)
                 (READ.fconj))
            (READ.32[1].argument3)))
        (WRITE.32[1].result1 (READ.lane1))
        (WRITE.fio (IOR (READ.io0) (READ.io1)))
        (WRITE.fov (IOR (READ.ov0) (READ.ov1)))
        (WRITE.fin (IOR (READ.in0) (READ.in1)))
        (IF
          (I2B (READ.imultiply))
          (SEQ
            (WRITE.result1
              (SWAP.32 (READ.result1)))
            (WRITE.32[0].result1
              (XOR (READ.32[0].result1) (CONST.0x80000000))))
          (SKIP)))
  - ID: FSBFWC
    what: Floating-Point Subtract from Word Complex
    class: FPU
    formats: [ ALU_FWCOP ]
    description: >
      The %3 and the %2 are interpreted as binary 32 floating-point complex numbers.
      If \emph{conjugate} is set, the complex conjugate of the %2 is used in the operation.
      The real and imaginary parts are respectively subtracted from and rounded according to the rounding mode.
      If \emph{imultiply} is set, the result is multiplied by the imaginary unit.
      The resulting binary 32 floating-point complex number is stored back into the %1.
      This instruction may raise exception bits in the CS register.
    execution: |
      fconj = conjugate ? 0x80000000 : 0;
      new (lane, lio, lov, lin) = f32_sub(RM, argument3.32[0], argument2.32[0]);
      result1.32[0] = lane;
      fio |= lio;
      fov |= lov;
      fin |= lin;
      new (lane, lio, lov, lin) = f32_sub(RM, argument3.32[1], argument2.32[1]^fconj);
      result1.32[1] = lane;
      fio |= lio;
      fov |= lov;
      fin |= lin;
      if (imultiply) {
        result1 = _SWAP_32(result1);
        result1.32[0] = result1.32[0] ^ 0x80000000;
      }
    behavior: |
      (SEQ
        (WRITE.fconj
          (SELECT
            (I2B (READ.conjugate))
            (CONST.0x80000000)
            (CONST.0)))
        (BIND.lane,lio,lov,lin
          (APPLY.32,1,1,1.f32_sub
              (READ.RM)
              (READ.32[0].argument3)
              (READ.32[0].argument2)))
        (WRITE.32[0].result1 (READ.lane))
        (WRITE.fio (IOR (READ.fio) (READ.lio)))
        (WRITE.fov (IOR (READ.fov) (READ.lov)))
        (WRITE.fin (IOR (READ.fin) (READ.lin)))
        (BIND.lane,lio,lov,lin
          (APPLY.32,1,1,1.f32_sub
              (READ.RM)
              (READ.32[1].argument3)
              (XOR (READ.32[1].argument2)
                   (READ.fconj))))
        (WRITE.32[1].result1 (READ.lane))
        (WRITE.fio (IOR (READ.fio) (READ.lio)))
        (WRITE.fov (IOR (READ.fov) (READ.lov)))
        (WRITE.fin (IOR (READ.fin) (READ.lin)))
        (IF
          (I2B (READ.imultiply))
          (SEQ
            (WRITE.result1
              (SWAP.32 (READ.result1)))
            (WRITE.32[0].result1
              (XOR (READ.32[0].result1) (CONST.0x80000000))))
          (SKIP)))
  - ID: FMULWC
    what: Floating-Point Multiply Word Complex
    class: FPU
    formats: [ ALU_FWCOP ]
    description: >
      The %3 and the %2 are interpreted as binary 32 floating-point complex numbers.
      If \emph{conjugate} is set, the complex conjugate of the %2 is used in the multiplication.
      The complex product is and rounded according to the rounding mode.
      If \emph{imultiply} is set, the result is multiplied by the imaginary unit.
      The resulting binary 32 floating-point complex number is stored back into the %1.
      This instruction may raise exception bits in the CS register.
    execution: |
      if (conjugate) {
        argument2.64[0] = fconj_32_32(argument2.64[0]);
      }
      new (lane, lio, lov, lin) = fmulc_32_32(RM, argument2.64[0], argument3.64[0]);
      result1.64[0] = lane;
      fio |= lio;
      fov |= lov;
      fin |= lin;
      if (imultiply) {
        result1 = _SWAP_32(result1);
        result1.32[0] = result1.32[0] ^ 0x80000000;
      }
    behavior: |
      (SEQ
        (IF
          (I2B (READ.conjugate))
          (WRITE.64[0].argument2
            (APPLY.64.fconj_32_32
              (READ.64[0].argument2)))
           (SKIP))
        (BIND.lane,lio,lov,lin
          (APPLY.64,1,1,1.fmulc_32_32
              (READ.RM)
              (READ.64[0].argument2)
              (READ.64[0].argument3)))
        (WRITE.64[0].result1 (READ.lane))
        (WRITE.fio (IOR (READ.fio) (READ.lio)))
        (WRITE.fov (IOR (READ.fov) (READ.lov)))
        (WRITE.fin (IOR (READ.fin) (READ.lin)))
        (IF
          (I2B (READ.imultiply))
          (SEQ
            (WRITE.result1
              (SWAP.32 (READ.result1)))
            (WRITE.32[0].result1
              (XOR (READ.32[0].result1) (CONST.0x80000000))))
          (SKIP)))
  - ID: FFMAWC
    what: Floating-Point Multiply Add Word Complex
    class: FPU
    formats: [ ALU_FWCOP ]
    description: >
      The %1, the %3 and the %2 are interpreted as binary 32 floating-point complex numbers.
      If \emph{conjugate} is set, the complex conjugate of the %2 is used in the multiplication.
      The complex product is added to the %1 and rounded according to the rounding mode.
      If \emph{imultiply} is set, the result is multiplied by the imaginary unit.
      The resulting binary 32 floating-point complex number is stored back into the %1.
      This instruction may raise exception bits in the CS register.
    execution: |
      if (conjugate) {
        argument2.64[0] = fconj_32_32(argument2.64[0]);
      }
      new (lane, lio, lov, lin) = ffmac_32_32(RM, argument2.64[0], argument3.64[0], argument1.64[0]);
      result1.64[0] = lane;
      fio |= lio;
      fov |= lov;
      fin |= lin;
      if (imultiply) {
        result1 = _SWAP_32(result1);
        result1.32[0] = result1.32[0] ^ 0x80000000;
      }
    behavior: |
      (SEQ
        (IF
          (I2B (READ.conjugate))
          (WRITE.64[0].argument2
            (APPLY.64.fconj_32_32
              (READ.64[0].argument2)))
           (SKIP))
        (BIND.lane,lio,lov,lin
          (APPLY.64,1,1,1.ffmac_32_32
              (READ.RM)
              (READ.64[0].argument2)
              (READ.64[0].argument3)
              (READ.64[0].argument1)))
        (WRITE.64[0].result1 (READ.lane))
        (WRITE.fio (IOR (READ.fio) (READ.lio)))
        (WRITE.fov (IOR (READ.fov) (READ.lov)))
        (WRITE.fin (IOR (READ.fin) (READ.lin)))
        (IF
          (I2B (READ.imultiply))
          (SEQ
            (WRITE.result1
              (SWAP.32 (READ.result1)))
            (WRITE.32[0].result1
              (XOR (READ.32[0].result1) (CONST.0x80000000))))
          (SKIP)))
  - ID: COPYO
    what: Copy Octuple Word
    formats: [ LSU_COPYO ]
    description: >
      The %1 operand receives the %2 value.
