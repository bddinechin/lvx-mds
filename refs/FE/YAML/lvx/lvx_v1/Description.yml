        (APPLY.32.MEM_atomic_cas
          (READ.address)
          (CONST.0x1)
          (IOR
            (READ.boolcas)
            (SHL (READ.coherency) (CONST.32)))
          (READ.8[0].arguments)
          (READ.8[8].arguments)
          (METHOD.%1)))
