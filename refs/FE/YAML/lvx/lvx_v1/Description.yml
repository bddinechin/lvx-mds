  - ID: CALL
    formats: [ BCU_UB ]
    what: Call Subroutine PC-Relative
    description: >
      The sequential next bundle \textbf{PC} is copied into the \textbf{RA} register.
      The next bundle \textbf{PC} is computed by adding to this instruction \textbf{PC}
      the %1 after 27-bit sign extension and scaling by 4.
    execution: |
      stage ID:
      new next = NPC;
      NPC = PC + argument1;
      stage RR:
      RA = next;
    behavior: |
      (SEQ
        (WRITE.next
          (F2I.64 (LOAD.ID (AGGL.NPC (CONST.0) (CONST.1)))))
        (WRITE.address
          (ADD
            (F2I.64 (LOAD.ID (AGGL.PC (CONST.0) (CONST.1))))
            (READ.argument1)))
        (STORE.ID (AGGL.NPC (CONST.0) (CONST.1))
          (I2F.64 (READ.address)))
        (STORE.RR (AGGL.SFR (CONST.RA) (CONST.1))
          (I2F.64 (READ.next)))
        (EFFECT.ID.branch_info (CONST.1) (READ.address)))
