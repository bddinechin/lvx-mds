  - ID: shuffleV
    what: Shuffle a Word Vector (1024 bits)
    members: [ ., .TD ]
    cases:
      - No Shuffle
      - Transpose Double Words 4x4
    execution: "_ZX_1(%0)"
  - ID: shuffleX
    what: Shuffle a Word Hexadecuple (512 bits)
    members: [ ., .ZD, .UD, .TQ, .TW, .ZW, .UW ]
    cases:
      - No Shuffle
      - Zip Double Words
      - Unzip Double Words
      - Transpose Quadruple Words 2x2
      - Transpose Words 4x4
      - Zip Words
      - Unzip Words
    execution: "_ZX_3(%0)"
  - ID: splat32
    what: Splat 32-bit Immediate
    members: [ ., ".@" ]
    cases:
      - No splat
      - Splat x2
    execution: "_ZX_1(%0)"
