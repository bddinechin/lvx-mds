    parameters:
      - action: Write
        method:
          RegClass: singleReg
        proxy: "%1"
        stages: 2
      - action: Write
        method:
          RegClass: singleReg
        proxy: "%3"
        stages: 2
      - action: Read
        method:
          RegClass: systemReg
        proxy: "%2"
        stages: 1
      - action: Read
        method:
          Immediate: wrapped32
        proxy: "%4"
        stages: 1
  - ID: GNUASM
    what: GNU ASM Statement.
    scheduling: ALL
    syntax: "%0"
    parameters:
