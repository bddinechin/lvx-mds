    resources: [ ISSUE, TINY, LSU, MEMW, SR13 ]
  - ID: LSU_MEMW_ACCR.X
    what: Instruction with one immediate extension, must issue on the LSU and writes to memory.
    requirements: [ 2, 1, 1, 1, 1 ]
    resources: [ ISSUE, TINY, LSU, MEMW, SR13 ]
  - ID: LSU_MEMW_ACCR.Y
    what: Instruction with two immediate extensions, must issue on the LSU and writes to memory.
