  - ID: DIVMODD
    what: Integer Division Modulus Double Word
    formats: [ ALU_DDMWRR ]
    schedulings: [ ALU_FULL ]
    description: >
      The dividend and the divisor assuming 64-bit signed integers in the %2 and the %3.
      The quotient and the remainder are computed and the corresponding 64 bits integers and packed into the 128 bits of the %1.
      Division by zero returns zero. Modulus by zero returns zero.
      Division of LONG\_MIN by -1 returns LONG\_MIN. Modulus of LONG\_MIN by -1 returns zero.
    execution: |
      if (argument3.64[0] == 0) {
        result1 = 0;
      } else if (argument2.64[0] == 0x8000000000000000
                 && argument3.64[0] == 0xFFFFFFFFFFFFFFFF) {
        result1.64[0] = argument2.64[0];
        result1.64[1] = 0;
      } else {
        new dividend = _SX_64(argument2.64[0]);
        new divisor = _SX_64(argument3.64[0]);
        result1.64[0] = dividend / divisor;
        result1.64[1] = dividend % divisor;
      }
    behavior: |
      (IF
        (EQ (READ.64[0].argument3) (CONST.0))
        (WRITE.result1 (CONST.0))
        (IF
          (ANDL
            (EQ (READ.64[0].argument2) (CONST.0x8000000000000000))
            (EQ (READ.64[0].argument3) (CONST.0xFFFFFFFFFFFFFFFF)))
          (SEQ
            (WRITE.64[0].result1 (READ.64[0].argument2))
            (WRITE.64[1].result1 (CONST.0)))
          (SEQ
            (WRITE.dividend (SX.64 (READ.64[0].argument2)))
            (WRITE.divisor (SX.64 (READ.64[0].argument3)))
            (WRITE.64[0].result1
              (DIV (READ.dividend) (READ.divisor)))
            (WRITE.64[1].result1
              (MOD (READ.dividend) (READ.divisor))))))
